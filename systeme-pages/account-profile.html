<script>
function showToast(message, type, duration) {
  type = type || 'info';
  duration = duration || 3000;
  var container = document.getElementById('toast-container');
  if (!container) {
    var newContainer = document.createElement('div');
    newContainer.id = 'toast-container';
    newContainer.className = 'toast-container';
    document.body.appendChild(newContainer);
    container = newContainer;
  }
  
  var icons = { success: '✅', error: '❌', info: 'ℹ️' };
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.innerHTML = `
    <span class="toast-icon">${icons[type] || 'ℹ️'}</span>
    <span>${message}</span>
    <button class="toast-close" onclick="this.parentElement.remove()">×</button>
  `;
  container.appendChild(toast);
  
  setTimeout(function() {
    if (toast.parentElement) {
      toast.remove();
    }
  }, duration);
}

  if (!document.getElementById('spinStyle')) {
    var style = document.createElement('style');
    style.id = 'spinStyle';
    style.textContent = '@keyframes spinLoad { to { transform: rotate(360deg); } }';
    document.head.appendChild(style);
  }
  
  if (!email || !token) {
    container.innerHTML = `
      <div style="background:#f8f9fa;border-radius:12px;padding:30px;text-align:center;border:1px solid #dee2e6;max-width:600px;margin:40px auto;">
        <h2 style="color:#dc3545;">Authentication Failed</h2>
        <p>Missing login credentials. Please request a new login link.</p>
        <button onclick="window.location.href='https://www.turnkii.es/'" class="btn-primary">Return to Home</button>
      </div>
    `;
    return;
  }
  
  window.openLightbox = function() {
    var overlay = document.getElementById('lightbox-overlay');
    if (!overlay) return;
    
    document.getElementById('lb-email').value = currentContactData.email || '';
    document.getElementById('lb-email').disabled = true;
    document.getElementById('lb-first-name').value = currentContactData.firstName || '';
    document.getElementById('lb-last-name').value = currentContactData.lastName || '';
    document.getElementById('lb-phone').value = currentContactData.mobileNumber || '';
    
    var selectedDisplay = document.getElementById('selected-country-display');
    if (selectedDisplay) {
      var countryCode = currentContactData.mobileCountryCode || '+34';
      var country = countries.find(function(c) { return c.code === countryCode; });
      if (country) {
        selectedDisplay.innerHTML = country.flag + ' ' + country.code + ' ' + country.name;
      } else {
        selectedDisplay.innerHTML = '🇪🇸 +34 Spain';
      }
    }
    var hidden = document.getElementById('selected-country-code');
    if (hidden) {
      hidden.value = currentContactData.mobileCountryCode || '+34';
    }
    var searchInput = document.getElementById('country-search');
    renderCountries(searchInput ? searchInput.value : '');
    
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  };
  
  window.closeLightbox = function() {
    var overlay = document.getElementById('lightbox-overlay');
    if (overlay) {
      overlay.classList.remove('active');
    }
    document.body.style.overflow = '';
  };
  
  window.saveProfile = function() {
    var firstName = document.getElementById('lb-first-name').value.trim();
    var lastName = document.getElementById('lb-last-name').value.trim();
    var mobileNumber = document.getElementById('lb-phone').value.trim();
    var mobileCountryCode = document.getElementById('selected-country-code').value;
    
    if (!firstName) { showToast('First name is required', 'error'); return; }
    if (!lastName) { showToast('Last name is required', 'error'); return; }
    if (mobileNumber && mobileNumber.length < 6) { showToast('Phone number must be at least 6 digits', 'error'); return; }
    
    var saveBtn = document.getElementById('lb-save-btn');
    var originalText = saveBtn.textContent;
    saveBtn.textContent = 'Saving...';
    saveBtn.disabled = true;
    
    var payload = {
      action: 'update',
      email: currentContactData.email,
      firstName: firstName,
      lastName: lastName,
      mobileNumber: mobileNumber,
      mobileCountryCode: mobileCountryCode
    };
    
    fetch(UPDATE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      if (data.success) {
        currentContactData.firstName = firstName;
        currentContactData.lastName = lastName;
        currentContactData.mobileNumber = mobileNumber;
        currentContactData.mobileCountryCode = mobileCountryCode;
        currentContactData.fullName = (firstName + ' ' + lastName).trim();
        renderProfile();
        window.closeLightbox();
        showToast('Profile updated successfully!', 'success');
      } else {
        showToast(data.error || 'Failed to update profile', 'error');
      }
    })
    .catch(function(err) {
      showToast('Network error: ' + err.message, 'error');
    })
    .finally(function() {
      saveBtn.textContent = originalText;
      saveBtn.disabled = false;
    });
  };
  
  // ============================================================
  // DOCUMENT FUNCTIONS (Dynamic)
  // ============================================================
  
  var SIGNING_TYPE_MAP = {
    'NIE_APODERADO': 'nie',
    'DATA_POLICY': 'privacy'
  };
  
  async function fetchUserDocuments(email) {
    try {
      var response = await fetch(CONTACT_ENDPOINT + '?action=get_documents&email=' + encodeURIComponent(email), {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
      });
      var data = await response.json();
      if (data.success) {
        return data.documents || [];
      } else {
        console.error('Failed to fetch documents:', data.error);
        return [];
      }
    } catch (err) {
      console.error('Error fetching documents:', err);
      return [];
    }
  }
  
  window.signDocument = async function(doc) {
    var data = currentContactData;
    var docType = doc.document_type;
    var displayName = doc.display_name || docType;
    
    var internalType = SIGNING_TYPE_MAP[docType];
    if (!internalType) {
      showToast('This document type is not configured for signing: ' + docType, 'error');
      return;
    }
    
    if (!data.email || !data.firstName) {
      showToast('Please ensure your account has a first name and email.', 'error');
      return;
    }
    
    showToast('Creating signing request for ' + displayName + '...', 'info');
    
    try {
      var response = await fetch('https://project-qv4f9.vercel.app/api/signforge/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: data.email,
          firstName: data.firstName,
          lastName: data.lastName,
          documentType: doc.document_type
        })
      });
      
      var result = await response.json();
      
      if (response.ok && result.signingUrl) {
        var popup = window.open(
          result.signingUrl,
          '_blank',
          'width=800,height=700,scrollbars=yes,resizable=yes'
        );
        
        if (!popup) {
          if (confirm('Please allow popups for this site, or click OK to open in a new tab.')) {
            window.location.href = result.signingUrl;
          }
          return;
        }
        
        showToast('Document sent for signing! Complete the signing in the popup window.', 'success');
        
        var interval = setInterval(function() {
          if (popup.closed) {
            clearInterval(interval);
            showToast('Signing completed. Refreshing status...', 'info');
            setTimeout(function() {
              fetchUserDocuments(data.email).then(function(docs) {
                renderDocuments(docs);
                showToast('Documents updated.', 'success');
              });
            }, 5000);
          }
        }, 1000);
      } else {
        showToast(result.error || 'Failed to create signing request.', 'error');
      }
    } catch (err) {
      showToast('Network error: ' + err.message, 'error');
    }
  };
  
  window.uploadDocument = function(doc) {
    var data = currentContactData;
    var docType = doc.document_type;
    var displayName = doc.display_name || docType;
    
    var input = document.createElement('input');
    input.type = 'file';
    input.accept = 'application/pdf,image/*';
    input.onchange = function(e) {
      var file = e.target.files[0];
      if (!file) return;
      
      var formData = new FormData();
      formData.append('file', file);
      formData.append('documentType', docType);
      formData.append('email', data.email);
      
      showToast('Uploading ' + displayName + '...', 'info');
      
      fetch('https://project-qv4f9.vercel.app/api/documents/upload', {
        method: 'POST',
        body: formData
      })
      .then(function(response) { return response.json(); })
      .then(function(data) {
        if (data.success) {
          showToast('Upload successful!', 'success');
          fetchUserDocuments(currentContactData.email).then(function(docs) {
            renderDocuments(docs);
          });
        } else {
          showToast('Upload failed: ' + (data.error || 'Unknown error'), 'error');
        }
      })
      .catch(function(err) {
        showToast('Network error: ' + err.message, 'error');
      });
    };
    input.click();
  };
  
  window.showDocumentContext = function(doc) {
    var title = doc.display_name || doc.document_type;
    var text = 'Information about ' + title + '. (Placeholder text – you can customize this per document type.)';
    
    var overlay = document.createElement('div');
    overlay.className = 'lightbox-overlay doc-context-lightbox';
    overlay.style.display = 'flex';
    overlay.innerHTML = `
      <div class="lightbox">
        <div class="lightbox-header">
          <h2>ℹ️ ${title}</h2>
          <button class="lightbox-close" onclick="this.closest('.lightbox-overlay').remove()">×</button>
        </div>
        <div style="padding: 10px 0;">
          <p>${text}</p>
        </div>
        <div class="lightbox-actions">
          <button class="btn-secondary" onclick="this.closest('.lightbox-overlay').remove()">Close</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);
  };
  
  window.refreshDocumentStatus = function() {
    var data = currentContactData;
    if (!data.email) {
      showToast('Email not found.', 'error');
      return;
    }
    showToast('Refreshing document status...', 'info');
    fetchUserDocuments(data.email).then(function(docs) {
      renderDocuments(docs);
      showToast('Documents updated.', 'success');
    }).catch(function() {
      showToast('Failed to refresh documents.', 'error');
    });
  };
  
  function renderDocuments(documents) {
    var container = document.getElementById('documents-container');
    if (!container) return;
    
    if (!documents || documents.length === 0) {
      container.innerHTML = '<div class="documents-section"><h2>📄 Your Documents</h2><p style="color:#6c757d;">No documents found.</p></div>';
      return;
    }
    
    documents.sort(function(a, b) {
      return (a.display_name || a.document_type).localeCompare(b.display_name || b.document_type);
    });
    
    var html = '<div class="documents-section"><h2>📄 Your Documents</h2>';
    
    documents.forEach(function(doc) {
      var status = doc.status || 'pending';
      var statusLabel = status.charAt(0).toUpperCase() + status.slice(1);
      var isCompleted = (status === 'completed' || status === 'signed' || status === 'delivered');
      var signedDate = doc.signed_at ? new Date(doc.signed_at).toLocaleDateString() : null;
      var displayName = doc.display_name || doc.document_type;
      
      var actionButton = '';
      if (!isCompleted) {
        if (doc.requires_signing === true) {
          actionButton = '<button class="btn-sign" onclick="window.signDocument(window._doc_'+doc.id+')">Sign</button>';
        } else {
          actionButton = '<button class="btn-sign" onclick="window.uploadDocument(window._doc_'+doc.id+')">Upload</button>';
        }
      }
      
      window['_doc_'+doc.id] = doc;
      
      html += `
        <div class="document-item">
          <div class="doc-info">
            <span class="doc-name">${displayName}</span>
            <span class="doc-status ${isCompleted ? 'signed' : 'pending'}">${statusLabel}</span>
            ${signedDate ? '<span class="doc-date-signed">Signed: ' + signedDate + '</span>' : ''}
          </div>
          <div class="doc-actions">
            <button class="btn-info" onclick="window.showDocumentContext(window._doc_'+doc.id+')" title="More info">?</button>
            ${actionButton}
          </div>
        </div>
      `;
    });
    
    html += '</div>';
    container.innerHTML = html;
  }
  
  // ============================================================
  // Logout Function
  // ============================================================
  window.logout = function() {
    if (!email || !token) {
      window.location.href = 'https://www.turnkii.es/';
      return;
    }
    fetch(UPDATE_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'logout',
        email: decodeURIComponent(email),
        token: token
      })
    })
    .then(function(response) { return response.json(); })
    .then(function(data) {
      console.log('Logout response:', data);
      window.location.href = 'https://www.turnkii.es/';
    })
    .catch(function() {
      window.location.href = 'https://www.turnkii.es/';
    });
  };
  
  // ============================================================
  // Render Profile
  // ============================================================
  function renderProfile() {
    var data = currentContactData;
    var displayName = data.fullName || data.firstName || data.email;
    var selectedCountry = countries.find(function(c) { return c.code === data.mobileCountryCode; });
    var selectedDisplayText = selectedCountry ? selectedCountry.flag + ' ' + selectedCountry.code + ' ' + selectedCountry.name : '🇪🇸 +34 Spain';
    
    container.innerHTML = `
      <div class="profile-container">
        <div class="profile-header">
          <div>
            <h1>👤 My Account</h1>
            <p>Welcome back, ${displayName}</p>
          </div>
          <div class="status-badge">✓ Active</div>
        </div>
        <div class="profile-body">
          <button class="section-edit-icon" onclick="window.openLightbox()" title="Edit Profile">
            ✎ <span>Edit</span>
          </button>
          
          <div class="profile-grid">
            <div class="profile-field">
              <label>First Name</label>
              <div class="field-value">${data.firstName || 'Not provided'}</div>
            </div>
            <div class="profile-field">
              <label>Last Name</label>
              <div class="field-value">${data.lastName || 'Not provided'}</div>
            </div>
            <div class="profile-field">
              <label>Email Address</label>
              <div class="field-value readonly">${data.email || 'Not provided'}</div>
            </div>
            <div class="profile-field">
              <label>Phone Number</label>
              <div class="field-value">${data.mobileNumber ? data.mobileCountryCode + ' ' + data.mobileNumber : 'Not provided'}</div>
            </div>
          </div>
          
          <div id="documents-container"></div>
          
          <div class="profile-actions">
            <button class="btn btn-refresh" onclick="window.refreshDocumentStatus()">🔄 Refresh Status</button>
            <button class="btn btn-logout" onclick="window.logout()">🚪 Logout</button>
          </div>
        </div>
      </div>
      
      <div id="lightbox-overlay" class="lightbox-overlay">
        <div class="lightbox">
          <div class="lightbox-header">
            <h2>✎ Edit Profile</h2>
            <button class="lightbox-close" onclick="window.closeLightbox()">×</button>
          </div>
          <div class="lightbox-field">
            <label>Email Address</label>
            <input type="email" id="lb-email" disabled>
          </div>
          <div class="lightbox-field">
            <label>First Name &amp; Last Name</label>
            <div class="name-row">
              <div class="name-field">
                <input type="text" id="lb-first-name" placeholder="First Name *">
              </div>
              <div class="name-field">
                <input type="text" id="lb-last-name" placeholder="Last Name *">
              </div>
            </div>
          </div>
          <div class="lightbox-field">
            <label>Phone Number</label>
            <div class="phone-wrapper">
              <div class="country-dropdown">
                <div class="selected-display" onclick="window.toggleDropdown()">
                  <span id="selected-country-display">${selectedDisplayText}</span>
                  <span class="arrow">▼</span>
                </div>
                <div class="dropdown-list">
                  <input type="text" class="search-input" id="country-search" placeholder="Search country..." oninput="window.renderCountries(this.value)">
                  <div id="country-list"></div>
                </div>
                <input type="hidden" id="selected-country-code" value="${data.mobileCountryCode || '+34'}">
              </div>
              <input type="tel" id="lb-phone" placeholder="Phone number" maxlength="20" value="${data.mobileNumber || ''}">
            </div>
          </div>
          <div class="lightbox-actions">
            <button class="btn-secondary" onclick="window.closeLightbox()">Cancel</button>
            <button class="btn-primary" id="lb-save-btn" onclick="window.saveProfile()">Save Changes</button>
          </div>
        </div>
      </div>
    `;
    
    var searchInput = document.getElementById('country-search');
    renderCountries(searchInput ? searchInput.value : '');
    
    document.addEventListener('click', function(e) {
      var dropdown = document.querySelector('.country-dropdown');
      if (dropdown && !dropdown.contains(e.target)) {
        var list = document.getElementById('country-list');
        if (list) {
          list.parentElement.classList.remove('open');
        }
      }
    });
    
    fetchUserDocuments(currentContactData.email).then(function(docs) {
      renderDocuments(docs);
    });
  }
  
  // ============================================================
  // Verify token and load profile using consolidated endpoint
  // ============================================================
  var decodedEmail = decodeURIComponent(email);
  
  // Call sp-contact with action=verify_token
  fetch(VERIFY_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      action: 'verify_token',
      email: decodedEmail,
      token: token
    })
  })
  .then(function(response) {
    if (!response.ok) {
      return response.json().then(function(data) {
        throw new Error(data.message || data.error || 'Verification failed');
      });
    }
    return response.json();
  })
  .then(function(data) {
    if (!data.success) {
      throw new Error(data.message || data.error || 'Invalid session');
    }
    
    // Populate currentContactData from the response
    currentContactData = {
      email: data.email || decodedEmail,
      firstName: data.firstName || '',
      lastName: data.lastName || '',
      fullName: data.fullName || (data.firstName || '' + ' ' + data.lastName || '').trim(),
      mobileNumber: data.mobileNumber || '',
      mobileCountryCode: data.mobileCountryCode || '+34'
    };
    
    renderProfile();
  })
  .catch(function(error) {
    console.error('❌ Error:', error);
    container.innerHTML = `
      <div style="background:#f8f9fa;border-radius:12px;padding:30px;text-align:center;border:1px solid #dee2e6;max-width:600px;margin:40px auto;">
        <h2 style="color:#dc3545;">Authentication Failed</h2>
        <p>${error.message || 'Unable to verify your account. Please request a new login link.'}</p>
        <button onclick="window.location.href='https://www.turnkii.es/'" class="btn-primary">Return to Home</button>
      </div>
    `;
  });
})();
</script>
