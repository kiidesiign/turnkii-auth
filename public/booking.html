<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Meeting</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f7f9fc;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
    .container{max-width:600px;width:100%;background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:32px}
    h1{font-size:28px;font-weight:700;color:#1a1a1a;margin-bottom:8px}
    .subtitle{color:#666;font-size:14px;margin-bottom:24px}
    .availability-info{background:#f0f7ff;padding:12px 16px;border-radius:8px;font-size:14px;color:#06c;margin-bottom:24px}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
    input,textarea{width:100%;padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;transition:border-color .2s}
    input:focus,textarea:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
    textarea{resize:vertical;min-height:80px}
    .slots-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-top:8px}
    .slot-btn{padding:10px;border:1px solid #d1d5db;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;transition:all .2s;text-align:center;font-variant-numeric:tabular-nums}
    .slot-btn:hover:not(:disabled):not(.booked){background:#f3f4f6;border-color:#3b82f6}
    .slot-btn.selected{background:#3b82f6;color:#fff;border-color:#3b82f6}
    .slot-btn.booked{opacity:.4;cursor:not-allowed;background:#f3f4f6;text-decoration:line-through}
    .slot-btn:disabled{opacity:.5;cursor:not-allowed}
    .btn-primary{width:100%;padding:12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;font-size:16px;font-weight:500;cursor:pointer;transition:background .2s}
    .btn-primary:hover:not(:disabled){background:#2563eb}
    .btn-primary:disabled{opacity:.5;cursor:not-allowed}
    .booking-form{margin-top:24px;padding-top:24px;border-top:1px solid #e5e7eb}
    .message{padding:12px 16px;border-radius:8px;margin-bottom:16px}
    .message.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
    .message.success{background:#d1fae5;color:#065f46;border:1px solid #a7f3d0}
    .message.success a{color:#065f46;text-decoration:underline}
    .message.info{background:#e0f2fe;color:#0369a1;border:1px solid #bae6fd}
    .loading{text-align:center;color:#666;padding:20px 0}
    .no-slots{text-align:center;color:#666;padding:20px 0}
    .hidden{display:none}
    .booked-label{font-size:11px;color:#999;display:block;margin-top:2px}
  </style>
</head>
<body>
  <div class="container" id="app">
    <h1>📅 Book a Meeting</h1>
    <p class="subtitle">30-minute consultation</p>
    <div class="availability-info">⏰ Available: Mon-Thu 14:00-17:00 · Fri 14:00-16:00 (London time)</div>

    <div class="form-group">
      <label for="datePicker">Select Date</label>
      <input type="date" id="datePicker" />
    </div>

    <div class="form-group">
      <label>Available Times (30-minute slots)</label>
      <div id="slotsContainer"><div class="loading">Loading available slots...</div></div>
    </div>

    <div id="bookingForm" class="booking-form hidden">
      <div id="messageContainer"></div>
      <div class="form-group">
        <label for="name">Your Name *</label>
        <input type="text" id="name" placeholder="Enter your name" required />
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" placeholder="Enter your email" required />
      </div>
      <div class="form-group">
        <label for="notes">Notes (optional)</label>
        <textarea id="notes" placeholder="Any special requests?"></textarea>
      </div>
      <button class="btn-primary" id="bookBtn">Book Now</button>
    </div>
  </div>

  <script>
    let selectedSlot = null;
    const $ = id => document.getElementById(id);
    const datePicker = $('datePicker');
    const slotsContainer = $('slotsContainer');
    const bookingForm = $('bookingForm');
    const messageContainer = $('messageContainer');
    const nameInput = $('name');
    const emailInput = $('email');
    const notesInput = $('notes');
    const bookBtn = $('bookBtn');

    // Set today's date
    const today = new Date();
    datePicker.value = today.toISOString().split('T')[0];
    datePicker.min = datePicker.value;

    // Load slots on page load and date change
    datePicker.addEventListener('change', loadSlots);
    bookBtn.addEventListener('click', handleBooking);
    loadSlots();

    async function loadSlots() {
      const date = datePicker.value;
      if (!date) return;
      slotsContainer.innerHTML = '<div class="loading">Loading available slots...</div>';
      bookingForm.classList.add('hidden');
      try {
        const res = await fetch(`/api/slots?date=${date}`);
        const data = await res.json();
        slotsContainer.innerHTML = data.slots?.length 
          ? `<div class="slots-grid">${data.slots.map(s => 
              `<button class="slot-btn" data-start="${s.start}" onclick="selectSlot('${s.start}')">${s.display}</button>`
            ).join('')}</div>`
          : '<div class="no-slots">No available slots for this day</div>';
      } catch(e) {
        slotsContainer.innerHTML = '<div class="message error">Failed to load slots. Please try again.</div>';
        console.error(e);
      }
    }

    function selectSlot(start) {
      document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
      const btn = document.querySelector(`.slot-btn[data-start="${start}"]`);
      if (btn && !btn.classList.contains('booked')) {
        btn.classList.add('selected');
        selectedSlot = start;
        bookingForm.classList.remove('hidden');
        messageContainer.innerHTML = '';
        console.log('✅ Selected:', start);
      }
    }

    async function handleBooking() {
      if (!selectedSlot) return showMessage('Please select a time slot first', 'error');
      const name = nameInput.value.trim();
      const email = emailInput.value.trim();
      if (!name || !email) return showMessage('Please enter your name and email', 'error');

      bookBtn.disabled = true;
      bookBtn.textContent = 'Booking...';
      messageContainer.innerHTML = '';

      // 🔥 FIX: Ensure UTC format
      let startTime = selectedSlot;
      if (!startTime.endsWith('Z')) {
        startTime = new Date(startTime).toISOString();
      }
      console.log('📤 Sending:', startTime);

      try {
        const res = await fetch('/api/book', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ startTime, name, email, notes: notesInput.value.trim() })
        });
        const result = await res.json();

        if (result.success) {
          const s = new Date(result.booking.start);
          const e = new Date(result.booking.end);
          showMessage(`
            ✅ <strong>Booking Confirmed!</strong><br />
            Meeting: ${s.toLocaleDateString()} ${s.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',hour12:false})} - ${e.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',hour12:false})}<br />
            ${result.booking.meetingUrl ? `<a href="${result.booking.meetingUrl}" target="_blank">🔗 Join Meeting</a>` : ''}
          `, 'success');
          bookingForm.classList.add('hidden');
          selectedSlot = null;
          document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'));
          nameInput.value = '';
          emailInput.value = '';
          notesInput.value = '';
          setTimeout(loadSlots, 1000);
        } else {
          const isConflict = result.error?.includes('already has booking') || result.error?.includes('not available');
          showMessage(isConflict ? 'This time slot is already booked. Please select another time.' : (result.error || 'Booking failed. Please try again.'), 'error');
          if (isConflict) setTimeout(loadSlots, 1000);
        }
      } catch(e) {
        showMessage('An error occurred. Please try again.', 'error');
        console.error(e);
      } finally {
        bookBtn.disabled = false;
        bookBtn.textContent = 'Book Now';
      }
    }

    function showMessage(msg, type = 'error') {
      messageContainer.innerHTML = `<div class="message ${type}">${msg}</div>`;
    }
  </script>
</body>
</html>
