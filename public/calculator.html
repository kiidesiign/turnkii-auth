<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spain Tax Calculator – 2025/2026 (AEAT Matching)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .calculator {
      max-width: 850px;
      width: 100%;
      background: white;
      padding: 2rem 2rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    h1 {
      font-size: 1.7rem;
      margin-top: 0;
      color: #1a2b4c;
      border-bottom: 2px solid #e9ecf2;
      padding-bottom: 0.75rem;
    }
    .sub {
      color: #4a5a72;
      margin-top: -0.5rem;
      font-size: 0.9rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin: 1.2rem 0;
    }
    .col {
      flex: 1 1 200px;
    }
    .col.hidden {
      display: none;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2c3e5a;
      margin-bottom: 4px;
    }
    input[type="number"], select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      background: #fafbfc;
    }
    input:focus, select:focus {
      outline: 2px solid #2a6df4;
      border-color: transparent;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2a6df4;
    }
    .btn {
      background: #1a2b4c;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin: 1rem 0 0.5rem;
      width: 100%;
    }
    .btn:hover { background: #2a3f66; }
    .results {
      margin-top: 1.8rem;
      background: #f0f4fe;
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      display: none;
    }
    .results.visible { display: block; }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1.5rem;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #dce3f0;
    }
    .result-item .label { color: #2c3e5a; font-weight: 500; }
    .result-item .value { font-weight: 700; color: #0b1e33; }
    .highlight {
      background: #dbeafe;
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      margin: 1rem 0 0;
      font-weight: 600;
      text-align: center;
      font-size: 1.2rem;
    }
    .disclaimer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #6b7a93;
      border-top: 1px solid #e2e8f0;
      padding-top: 1rem;
    }
    .mode-toggle {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0.5rem 0 0.2rem;
      padding: 8px 12px;
      background: #f3f6fc;
      border-radius: 8px;
      flex-wrap: wrap;
    }
    .mode-toggle label {
      margin: 0;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .year-selector {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0.5rem 0 0.2rem;
      padding: 8px 12px;
      background: #f0f7ff;
      border-radius: 8px;
    }
    .year-selector select {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid #cbd5e1;
      font-size: 0.95rem;
      background: white;
    }
    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.5rem 0 0.8rem;
      font-size: 0.9rem;
    }
    .breakdown-table th {
      background: #e2e8f0;
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
    }
    .breakdown-table td {
      padding: 5px 8px;
      border-bottom: 1px solid #dce3f0;
    }
    .breakdown-table tr:last-child td {
      border-bottom: none;
    }
    .breakdown-total {
      font-weight: 700;
      background: #f8faff;
    }
    .section-title {
      font-weight: 600;
      font-size: 1.05rem;
      margin: 0.8rem 0 0.3rem;
    }
    .contribution-section {
      background: #f3f8fc;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin: 0.8rem 0;
      border: 1px solid #dce7f2;
    }
    .contribution-section label {
      font-weight: 500;
      font-size: 0.85rem;
    }
    .contribution-section .row {
      margin: 0.5rem 0;
    }
    .hidden {
      display: none !important;
    }
    .bracket-info {
      background: #f0faf0;
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      margin: 0.2rem 0;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .bracket-info strong {
      font-weight: 600;
    }
    .bracket-optimisation {
      margin-top: 0.3rem;
      padding-top: 0.3rem;
      border-top: 1px solid #cde0cd;
    }
    .bracket-optimisation .opt-line {
      display: flex;
      justify-content: space-between;
      padding: 0.1rem 0;
    }
    @media (max-width: 550px) {
      .calculator { padding: 1.2rem; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="calculator">
  <h1>🇪🇸 Spain Tax Calculator · Andalusia</h1>
  <div class="sub"></div>

  <div class="year-selector">
    <label style="font-weight:600; margin:0;">Tax Year:</label>
    <select id="taxYear" onchange="calculateTax()">
      <option value="2025">2025</option>
      <option value="2026" selected>2026</option>
    </select>
    <span style="font-size:0.8rem; color:#4a5a72; margin-left:6px;"></span>
  </div>

  <div class="row">
    <div class="col" id="spouse1Col">
      <label id="spouse1Label">Spouse-1 – Gross Income (€)</label>
      <input type="number" id="spouse1Income" value="15000" step="100" />
      <div class="checkbox-group">
        <input type="checkbox" id="spouse1Over65" checked />
        <label style="font-weight:400; margin:0;">Spouse-1 is over 65</label>
      </div>
    </div>
    <div class="col" id="spouse2Col">
      <label id="spouse2Label">Spouse-2 – Gross Income (€)</label>
      <input type="number" id="spouse2Income" value="15000" step="100" />
      <div class="checkbox-group">
        <input type="checkbox" id="spouse2Over65" checked />
        <label style="font-weight:400; margin:0;">Spouse-2 is over 65</label>
      </div>
    </div>
  </div>

  <!-- PENSION CONTRIBUTIONS SECTION – ALWAYS SHOW ALL FIELDS (except Single Mode) -->
  <div class="contribution-section" id="contributionSection">
    <div style="font-weight:600; margin-bottom:6px;">💰 Pension Plan Contributions (Spain)</div>
    <div class="row" id="ownContribRow">
      <div class="col" id="own1Col">
        <label id="own1Label">Spouse-1 own contribution (max €1,500)</label>
        <input type="number" id="contrib1Own" value="0" step="100" min="0" max="1500" />
      </div>
      <div class="col" id="own2Col">
        <label id="own2Label">Spouse-2 own contribution (max €1,500)</label>
        <input type="number" id="contrib2Own" value="0" step="100" min="0" max="1500" />
      </div>
    </div>
    <div class="row" id="spousalContribRow">
      <div class="col">
        <label>Spouse-1 → Spouse-2 (spousal, max €1,000)</label>
        <input type="number" id="contribSpousal12" value="0" step="100" min="0" max="1000" />
        <div style="font-size:0.75rem; color:#4a5a72; margin-top:2px;">Only if Spouse-2's net income (after €2,000 deduction) &lt; €8,000</div>
      </div>
    </div>
  </div>

  <div class="mode-toggle">
    <input type="checkbox" id="singleMode" />
    <label for="singleMode">Single Taxpayer Mode (hide Spouse-2)</label>
  </div>

  <div style="margin: 0.5rem 0 0.2rem;">
    <label>Filing Status</label>
    <select id="filingStatus">
      <option value="separate">Separate Return</option>
      <option value="joint" selected>Joint Return</option>
    </select>
  </div>

  <button class="btn" onclick="calculateTax()">Calculate Tax</button>

  <div id="results" class="results visible">
    <div id="resultContent"></div>
  </div>

  <div class="disclaimer">
    <strong>Important:</strong> This calculator is for illustrative purposes only. Always verify with the AEAT.
  </div>
</div>

<script>
  // ================================================================
  // 2025 – State and Autonomous (Andalusia) brackets & minimums
  // ================================================================
  const STATE_BRACKETS_2025 = [
    { upTo: 12450, rate: 0.095 },
    { upTo: 20200, rate: 0.12 },
    { upTo: 35200, rate: 0.15 },
    { upTo: 60000, rate: 0.185 },
    { upTo: 300000, rate: 0.225 },
    { upTo: Infinity, rate: 0.255 }
  ];

  const AUTON_BRACKETS_2025 = [
    { upTo: 12450, rate: 0.095 },
    { upTo: 20200, rate: 0.12 },
    { upTo: 35200, rate: 0.147 },
    { upTo: 60000, rate: 0.185 },
    { upTo: 300000, rate: 0.225 },
    { upTo: Infinity, rate: 0.255 }
  ];

  // Combined rates for 2025 (used for breakdown display)
  const COMBINED_BRACKETS_2025 = [
    { upTo: 12450, rate: 0.19 },
    { upTo: 20200, rate: 0.24 },
    { upTo: 35200, rate: 0.297 },
    { upTo: 60000, rate: 0.37 },
    { upTo: 300000, rate: 0.45 },
    { upTo: Infinity, rate: 0.47 }
  ];

  // 2025 minimums
  const STATE_MIN_UNDER_65_2025 = 5550;
  const STATE_MIN_OVER_65_2025   = 6700;
  const AUTON_MIN_UNDER_65_2025  = 5790;
  const AUTON_MIN_OVER_65_2025   = 6990;

  // ================================================================
  // 2026 – Combined rates
  // ================================================================
  const COMBINED_BRACKETS_2026 = [
    { upTo: 12450, rate: 0.19 },
    { upTo: 13000, rate: 0.215 },
    { upTo: 20200, rate: 0.24 },
    { upTo: 21100, rate: 0.27 },
    { upTo: 35200, rate: 0.30 },
    { upTo: 60000, rate: 0.37 },
    { upTo: 120000, rate: 0.45 },
    { upTo: 300000, rate: 0.47 },
    { upTo: Infinity, rate: 0.47 }
  ];

  const COMBINED_MIN_UNDER_65 = 5550;
  const COMBINED_MIN_OVER_65  = 6700;

  // ================================================================
  // Constants
  // ================================================================
  const WORK_DEDUCTION = 2000;
  const JOINT_REDUCTION = 3400;
  const OWN_CONTRIB_LIMIT = 1500;
  const SPOUSAL_CONTRIB_LIMIT = 1000;
  const SPOUSAL_CONTRIB_MIN_INCOME = 8000;

  // ================================================================
  // Tax engines
  // ================================================================

  // Generic: tax on base using a bracket array
  function taxOnBrackets(base, brackets) {
    if (base <= 0) return 0;
    let remaining = base;
    let tax = 0;
    let prev = 0;
    for (const b of brackets) {
      const slice = Math.min(remaining, b.upTo - prev);
      if (slice <= 0) break;
      tax += slice * b.rate;
      remaining -= slice;
      prev = b.upTo;
      if (remaining <= 0) break;
    }
    return tax;
  }

  // Returns array of { bracketLabel, amount, rate, tax }
  function getBracketBreakdown(base, brackets) {
    if (base <= 0) return [];
    const result = [];
    let remaining = base;
    let prev = 0;
    for (const b of brackets) {
      const slice = Math.min(remaining, b.upTo - prev);
      if (slice <= 0) break;
      result.push({
        bracketLabel: `€${formatCurrency(prev)} – €${formatCurrency(b.upTo)}`,
        amount: slice,
        rate: b.rate,
        tax: slice * b.rate
      });
      remaining -= slice;
      prev = b.upTo;
      if (remaining <= 0) break;
    }
    return result;
  }

  // Get bracket position with friendly display info
  function getBracketPosition(base, brackets) {
    if (base <= 0) {
      return {
        amountOver: 0,
        gap: brackets[0].upTo,
        currentRate: 0,
        nextRate: brackets[0].rate,
        lowerBound: 0,
        upperBound: brackets[0].upTo,
        isTop: false
      };
    }
    let currentBracket = null;
    let nextBracket = null;
    let lowerBound = 0;
    let currentIndex = -1;
    for (let i = 0; i < brackets.length; i++) {
      if (base <= brackets[i].upTo) {
        currentBracket = brackets[i];
        currentIndex = i;
        if (i < brackets.length - 1) {
          nextBracket = brackets[i + 1];
        }
        lowerBound = (i === 0) ? 0 : brackets[i-1].upTo;
        break;
      }
    }
    if (!currentBracket) {
      // Beyond the last bracket – top bracket
      const last = brackets[brackets.length - 1];
      const secondLast = brackets.length >= 2 ? brackets[brackets.length - 2] : { upTo: 0 };
      return {
        amountOver: base - (secondLast.upTo || 0),
        gap: 0,
        currentRate: last.rate,
        nextRate: null,
        lowerBound: secondLast.upTo || 0,
        upperBound: Infinity,
        isTop: true
      };
    }

    let upperBound = currentBracket.upTo;
    let gap = upperBound - base;
    if (gap < 0) gap = 0;
    let amountOver = base - lowerBound;
    if (amountOver < 0) amountOver = 0;

    // If base is exactly on the boundary, treat as already in next bracket
    if (base === upperBound && nextBracket) {
      lowerBound = upperBound;
      upperBound = nextBracket.upTo;
      amountOver = 0;
      gap = upperBound - base;
      return {
        amountOver: amountOver,
        gap: gap,
        currentRate: nextBracket.rate,
        nextRate: (currentIndex + 2 < brackets.length) ? brackets[currentIndex + 2].rate : null,
        lowerBound: lowerBound,
        upperBound: upperBound,
        isTop: false
      };
    }

    return {
      amountOver: amountOver,
      gap: gap,
      currentRate: currentBracket.rate,
      nextRate: nextBracket ? nextBracket.rate : null,
      lowerBound: lowerBound,
      upperBound: upperBound,
      isTop: !nextBracket
    };
  }

  // ---- Helper to format bracket section with optimisation targets ----
  function formatBracketSection(pos, base, brackets, filingStatus, year, singleMode, gross1, gross2) {
    // Calculate gross income needed for each bracket target (upper limit)
    let targetLines = '';
    // Determine work deductions for the taxpayer(s)
    let workDeductions = 0;
    if (filingStatus === 'separate' || singleMode) {
      // For separate, we only consider the person whose bracket we're showing (gross1 is the relevant one)
      if (gross1 > 0) workDeductions = WORK_DEDUCTION;
      // For the joint case, we'll compute both
    } else {
      // Joint
      if (gross1 > 0) workDeductions += WORK_DEDUCTION;
      if (gross2 > 0) workDeductions += WORK_DEDUCTION;
    }

    // For separate/single, we compute targets for the single person
    // For joint, we compute targets for the combined gross
    let targets = [];
    let prev = 0;
    for (let i = 0; i < brackets.length; i++) {
      const b = brackets[i];
      if (b.upTo === Infinity) continue; // skip last bracket
      let grossTarget;
      if (filingStatus === 'separate' || singleMode) {
        grossTarget = b.upTo + (gross1 > 0 ? WORK_DEDUCTION : 0);
      } else {
        // joint: need to add joint reduction plus work deductions for both
        grossTarget = b.upTo + JOINT_REDUCTION + workDeductions;
      }
      // Only show if the target is positive and the bracket rate is different from the previous (to avoid duplicates)
      if (grossTarget > 0) {
        let ratePercent = Math.round(b.rate * 100);
        targets.push({ rate: ratePercent, gross: grossTarget });
      }
    }

    // Build the optimisation lines
    if (targets.length > 0) {
      targetLines = '<div class="bracket-optimisation">';
      targetLines += '<div style="font-weight:600; font-size:0.9rem; margin-bottom:0.2rem;">Optimise each bracket:</div>';
      targets.forEach(t => {
        targetLines += `<div class="opt-line"><span>Top of ${t.rate}% bracket</span><span>€${Math.round(t.gross)}</span></div>`;
      });
      targetLines += '</div>';
    }

    // Current bracket info
    let currentHtml = '<div class="bracket-info">';
    currentHtml += '<strong>Tax Brackets</strong><br/>';
    if (pos.isTop) {
      currentHtml += `All income above €${Math.round(pos.lowerBound)} taxed at ${Math.round(pos.currentRate * 100)}%`;
    } else {
      if (pos.amountOver > 0) {
        currentHtml += `€${Math.round(pos.amountOver)} taxed at ${Math.round(pos.currentRate * 100)}%<br/>`;
      } else {
        currentHtml += `€0 taxed at ${Math.round(pos.currentRate * 100)}%<br/>`;
      }
      if (pos.gap > 0 && pos.nextRate !== null) {
        currentHtml += `€${Math.round(pos.gap)} more income to be taxed at ${Math.round(pos.nextRate * 100)}%`;
      } else if (pos.gap === 0 && pos.nextRate !== null) {
        currentHtml += `next bracket starts at €${Math.round(pos.upperBound)}`;
      } else {
        currentHtml += 'at top bracket';
      }
    }
    currentHtml += '</div>';

    // Combine both
    return currentHtml + targetLines;
  }

  // --- 2025 split calculation (exact AEAT) ---
  function calc2025Individual(gross, isOver65) {
    if (gross <= 0) {
      return { tax: 0, netIncome: 0, base: 0, stateTax: 0, autonTax: 0, stateAllowTax: 0, autonAllowTax: 0 };
    }
    const net = Math.max(0, gross - WORK_DEDUCTION);
    const base = net;

    const stateMin = isOver65 ? STATE_MIN_OVER_65_2025 : STATE_MIN_UNDER_65_2025;
    const autonMin = isOver65 ? AUTON_MIN_OVER_65_2025 : AUTON_MIN_UNDER_65_2025;

    const stateTax = taxOnBrackets(base, STATE_BRACKETS_2025);
    const autonTax = taxOnBrackets(base, AUTON_BRACKETS_2025);

    const stateAllowTax = taxOnBrackets(stateMin, STATE_BRACKETS_2025);
    const autonAllowTax = taxOnBrackets(autonMin, AUTON_BRACKETS_2025);

    const totalTax = Math.max(0, (stateTax - stateAllowTax) + (autonTax - autonAllowTax));

    return {
      tax: totalTax,
      netIncome: gross - totalTax,
      base: base,
      stateTax: stateTax,
      autonTax: autonTax,
      stateAllowTax: stateAllowTax,
      autonAllowTax: autonAllowTax,
      stateMin: stateMin,
      autonMin: autonMin,
      // total allowance for display
      totalAllowance: stateMin + autonMin,
      totalAllowanceTax: stateAllowTax + autonAllowTax
    };
  }

  function calc2025Joint(gross1, gross2, over65_1, over65_2) {
    const net1 = gross1 > 0 ? Math.max(0, gross1 - WORK_DEDUCTION) : 0;
    const net2 = gross2 > 0 ? Math.max(0, gross2 - WORK_DEDUCTION) : 0;
    const totalNet = net1 + net2;
    const base = Math.max(0, totalNet - JOINT_REDUCTION);

    let stateMin = 0;
    let autonMin = 0;
    if (gross1 > 0) {
      stateMin += over65_1 ? STATE_MIN_OVER_65_2025 : STATE_MIN_UNDER_65_2025;
      autonMin += over65_1 ? AUTON_MIN_OVER_65_2025 : AUTON_MIN_UNDER_65_2025;
    }
    if (gross2 > 0) {
      stateMin += over65_2 ? STATE_MIN_OVER_65_2025 : STATE_MIN_UNDER_65_2025;
      autonMin += over65_2 ? AUTON_MIN_OVER_65_2025 : AUTON_MIN_UNDER_65_2025;
    }

    const stateTax = taxOnBrackets(base, STATE_BRACKETS_2025);
    const autonTax = taxOnBrackets(base, AUTON_BRACKETS_2025);

    const stateAllowTax = taxOnBrackets(stateMin, STATE_BRACKETS_2025);
    const autonAllowTax = taxOnBrackets(autonMin, AUTON_BRACKETS_2025);

    const totalTax = Math.max(0, (stateTax - stateAllowTax) + (autonTax - autonAllowTax));
    const totalGross = gross1 + gross2;

    return {
      totalGross: totalGross,
      tax: totalTax,
      netIncome: totalGross - totalTax,
      base: base,
      stateTax: stateTax,
      autonTax: autonTax,
      stateAllowTax: stateAllowTax,
      autonAllowTax: autonAllowTax,
      stateMin: stateMin,
      autonMin: autonMin,
      totalAllowance: stateMin + autonMin,
      totalAllowanceTax: stateAllowTax + autonAllowTax,
      gross1: gross1,
      gross2: gross2
    };
  }

  // --- 2026 simplified combined calculation ---
  function calc2026Individual(gross, isOver65) {
    if (gross <= 0) return { tax: 0, netIncome: 0, base: 0, grossTax: 0, allowTax: 0 };
    const net = Math.max(0, gross - WORK_DEDUCTION);
    const base = net;
    const allowance = isOver65 ? COMBINED_MIN_OVER_65 : COMBINED_MIN_UNDER_65;
    const grossTax = taxOnBrackets(base, COMBINED_BRACKETS_2026);
    const allowTax = taxOnBrackets(allowance, COMBINED_BRACKETS_2026);
    const tax = Math.max(0, grossTax - allowTax);
    return {
      tax: tax,
      netIncome: gross - tax,
      base: base,
      grossTax: grossTax,
      allowTax: allowTax,
      allowance: allowance
    };
  }

  function calc2026Joint(gross1, gross2, over65_1, over65_2) {
    const net1 = gross1 > 0 ? Math.max(0, gross1 - WORK_DEDUCTION) : 0;
    const net2 = gross2 > 0 ? Math.max(0, gross2 - WORK_DEDUCTION) : 0;
    const totalNet = net1 + net2;
    const base = Math.max(0, totalNet - JOINT_REDUCTION);

    let allowance = 0;
    if (gross1 > 0) allowance += over65_1 ? COMBINED_MIN_OVER_65 : COMBINED_MIN_UNDER_65;
    if (gross2 > 0) allowance += over65_2 ? COMBINED_MIN_OVER_65 : COMBINED_MIN_UNDER_65;

    const grossTax = taxOnBrackets(base, COMBINED_BRACKETS_2026);
    const allowTax = taxOnBrackets(allowance, COMBINED_BRACKETS_2026);
    const tax = Math.max(0, grossTax - allowTax);
    const totalGross = gross1 + gross2;

    return {
      totalGross: totalGross,
      tax: tax,
      netIncome: totalGross - tax,
      base: base,
      grossTax: grossTax,
      allowTax: allowTax,
      allowance: allowance,
      gross1: gross1,
      gross2: gross2
    };
  }

  // ================================================================
  // UI
  // ================================================================
  function formatCurrency(amount) {
    return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  // Generate HTML for a breakdown table with allowance credit
  function breakdownTableHTML(breakdown, title, allowanceAmount = 0, allowanceTax = 0) {
    if (!breakdown || breakdown.length === 0) return '';
    let rows = breakdown.map(item => `
      <tr>
        <td>${item.bracketLabel}</td>

        <td>${(item.rate * 100).toFixed(1)}%</td>
        <td>€${formatCurrency(item.tax)}</td>
      </tr>
    `).join('');

    const totalGrossTax = breakdown.reduce((sum, i) => sum + i.tax, 0);
    const totalAmount = breakdown.reduce((sum, i) => sum + i.amount, 0);
    const netTax = Math.max(0, totalGrossTax - allowanceTax);

    // Add allowance row if applicable
    let allowanceRow = '';
    if (allowanceTax > 0) {
      allowanceRow = `
        <tr style="background:#f0faf0;">
          <td><strong>Personal allowance credit</strong></td>

          <td>${(allowanceTax / allowanceAmount * 100).toFixed(1)}%</td>
          <td><strong>-€${formatCurrency(allowanceTax)}</strong></td>

      `;

    return `

  // Apply contributions and return adjusted gross incomes
  // Now uses net work income (gross - WORK_DEDUCTION) for spousal contribution condition
  function applyContributions(gross1, gross2, contrib1Own, contrib2Own, contribSpousal12) {
    // Compute net work income for each spouse (after the general work deduction)
    let net1 = Math.max(0, gross1 - WORK_DEDUCTION);
    let net2 = Math.max(0, gross2 - WORK_DEDUCTION);

    // Own contributions (max 1500 each) – reduce gross income
    let own1 = Math.min(contrib1Own, OWN_CONTRIB_LIMIT);
    let own2 = Math.min(contrib2Own, OWN_CONTRIB_LIMIT);
    let adj1 = Math.max(0, gross1 - own1);
    let adj2 = Math.max(0, gross2 - own2);

    // Spousal contribution: allowed if recipient's net work income < 8000
    let spousal12 = 0;
    if (net2 < SPOUSAL_CONTRIB_MIN_INCOME) {
      spousal12 = Math.min(contribSpousal12, SPOUSAL_CONTRIB_LIMIT);
    }
    adj1 -= spousal12; // Spouse-1 deducts the spousal contribution from his own income

    // Ensure non-negative
    adj1 = Math.max(0, adj1);
    adj2 = Math.max(0, adj2);

    return {
      adj1: adj1,
      adj2: adj2,
      own1: own1,
      own2: own2,
      spousal12: spousal12
    };
  }

  // Now we show all fields (own1, own2, spousal) except when single mode hides spouse-2.
  function toggleContributionFields() {
    const singleMode = document.getElementById('singleMode').checked;

    const own2Label = document.getElementById('own2Label');

    if (singleMode) {
      // Single mode: show only own1 contribution, hide everything else
      ownRow.classList.remove('hidden');
      if (own1Col) own1Col.classList.remove('hidden');
      if (own2Col) own2Col.classList.add('hidden');
      spousalRow.classList.add('hidden');
      // Update label for own1
      own1Label.textContent = 'Single Taxpayer own contribution (max €1,500)';
      // Reset other fields
      document.getElementById('contrib2Own').value = 0;
      document.getElementById('contribSpousal12').value = 0;
      return;
    }

    // Not single mode: show everything
    ownRow.classList.remove('hidden');
    spousalRow.classList.remove('hidden');
    if (own1Col) own1Col.classList.remove('hidden');
    if (own2Col) own2Col.classList.remove('hidden');
    own1Label.textContent = 'Spouse-1 own contribution (max €1,500)';
    own2Label.textContent = 'Spouse-2 own contribution (max €1,500)';
  }

          </div>
        `;
      }
    }

    contentDiv.innerHTML = html;
    resultDiv.classList.add('visible');
  }

  // ---- Event listeners ----
  document.getElementById('singleMode').addEventListener('change', function() {
    const col = document.getElementById('spouse2Col');
    const filingStatus = document.getElementById('filingStatus');
    const spouse1Label = document.getElementById('spouse1Label');
    if (this.checked) {
      col.classList.add('hidden');
      document.getElementById('spouse2Income').value = 0;
      document.getElementById('spouse2Over65').checked = false;
      // Reset contributions
      document.getElementById('contrib2Own').value = 0;
      document.getElementById('contribSpousal12').value = 0;
      filingStatus.disabled = true;
      filingStatus.value = 'separate';
      spouse1Label.textContent = 'Single Taxpayer – Gross Income (€)';
    } else {
      col.classList.remove('hidden');
      filingStatus.disabled = false;
      spouse1Label.textContent = 'Spouse-1 – Gross Income (€)';
    }
    toggleContributionFields();
    calculateTax();
  });

  document.getElementById('filingStatus').addEventListener('change', function() {
    // No need to toggle fields, but we recalculate
    calculateTax();
  });

  // Initial setup
  window.onload = function() {
    toggleContributionFields();
    calculateTax();
  };
</script>
</body>
</html>
