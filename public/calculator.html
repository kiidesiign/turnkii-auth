<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 Spain Tax Calculator – Andalusia</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f7fa;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .calculator {
      max-width: 780px;
      width: 100%;
      background: white;
      padding: 2rem 2rem 1.5rem;
      border-radius: 20px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.12);
    }
    h1 {
      font-size: 1.7rem;
      margin-top: 0;
      color: #1a2b4c;
      border-bottom: 2px solid #e9ecf2;
      padding-bottom: 0.75rem;
    }
    .sub {
      color: #4a5a72;
      margin-top: -0.5rem;
      font-size: 0.9rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 1.2rem;
      margin: 1.2rem 0;
    }
    .col {
      flex: 1 1 200px;
    }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: #2c3e5a;
      margin-bottom: 4px;
    }
    input[type="number"], select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      background: #fafbfc;
    }
    input:focus, select:focus {
      outline: 2px solid #2a6df4;
      border-color: transparent;
    }
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
    }
    .checkbox-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #2a6df4;
    }
    .btn {
      background: #1a2b4c;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 40px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin: 1rem 0 0.5rem;
      width: 100%;
    }
    .btn:hover { background: #2a3f66; }
    .results {
      margin-top: 1.8rem;
      background: #f0f4fe;
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      display: none;
    }
    .results.visible { display: block; }
    .result-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1.5rem;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #dce3f0;
    }
    .result-item .label { color: #2c3e5a; font-weight: 500; }
    .result-item .value { font-weight: 700; color: #0b1e33; }
    .highlight {
      background: #dbeafe;
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      margin: 1rem 0 0;
      font-weight: 600;
      text-align: center;
      font-size: 1.2rem;
    }
    .disclaimer {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #6b7a93;
      border-top: 1px solid #e2e8f0;
      padding-top: 1rem;
    }
    .badge {
      background: #2563eb;
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      display: inline-block;
      margin-left: 6px;
    }
    @media (max-width: 550px) {
      .calculator { padding: 1.2rem; }
      .result-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="calculator">
  <h1>🇪🇸 2026 Tax Calculator · Andalusia</h1>
  <div class="sub">IRPF for pension income – updated with AEAT methodology</div>

  <div class="row">
    <div class="col">
      <label>Spouse-1 – Gross Income (€)</label>
      <input type="number" id="spouse1Income" value="63125" step="100" />
      <div class="checkbox-group">
        <input type="checkbox" id="spouse1Over65" checked />
        <label style="font-weight:400; margin:0;">Spouse-1 is over 65</label>
      </div>
    </div>
    <div class="col">
      <label>Spouse-2 – Gross Income (€)</label>
      <input type="number" id="spouse2Income" value="17500" step="100" />
      <div class="checkbox-group">
        <input type="checkbox" id="spouse2Over65" />
        <label style="font-weight:400; margin:0;">Spouse-2 is over 65</label>
      </div>
    </div>
  </div>

  <div style="margin: 0.5rem 0 0.2rem;">
    <label>Filing Status</label>
    <select id="filingStatus">
      <option value="separate">Separate Returns</option>
      <option value="joint">Joint Return</option>
    </select>
  </div>

  <button class="btn" onclick="calculateTax()">Calculate Tax</button>

  <div id="results" class="results">
    <div id="resultContent"></div>
  </div>

  <div class="disclaimer">
    <strong>Important:</strong> This calculator is for illustrative purposes only and uses the 2026 Andalusian combined rates.
    It does not constitute tax advice. Always verify with a qualified tax adviser and the AEAT.
  </div>
</div>

<script>
  // 2026 Andalusian combined tax brackets
  const BRACKETS = [
    { upTo: 12450, rate: 0.19 },
    { upTo: 13000, rate: 0.215 },
    { upTo: 20200, rate: 0.24 },
    { upTo: 21100, rate: 0.27 },
    { upTo: 35200, rate: 0.30 },
    { upTo: 60000, rate: 0.37 },
    { upTo: 120000, rate: 0.45 },
    { upTo: 300000, rate: 0.47 },
    { upTo: Infinity, rate: 0.47 }
  ];

  // Personal minimums
  const MIN_UNDER_65 = 5550;
  const MIN_OVER_65 = 6700;

  // Work income deduction (pension income qualifies)
  const WORK_DEDUCTION = 2000;

  // Joint filing reduction
  const JOINT_REDUCTION = 3400;

  // ---- Tax calculation engine ----
  function taxOnBase(base) {
    if (base <= 0) return 0;
    let remaining = base;
    let tax = 0;
    let prev = 0;
    for (const b of BRACKETS) {
      const slice = Math.min(remaining, b.upTo - prev);
      if (slice <= 0) break;
      tax += slice * b.rate;
      remaining -= slice;
      prev = b.upTo;
      if (remaining <= 0) break;
    }
    return tax;
  }

  function calculateIndividual(gross, isOver65) {
    if (gross <= 0) return { netIncome: 0, tax: 0, base: 0, allowance: 0, grossTax: 0, allowanceTax: 0 };
    const net = Math.max(0, gross - WORK_DEDUCTION);
    const base = net;
    const allowance = isOver65 ? MIN_OVER_65 : MIN_UNDER_65;
    const grossTax = taxOnBase(base);
    const allowanceTax = taxOnBase(allowance);
    const tax = Math.max(0, grossTax - allowanceTax);
    return {
      gross: gross,
      netIncome: gross - tax,
      tax: tax,
      base: base,
      allowance: allowance,
      grossTax: grossTax,
      allowanceTax: allowanceTax
    };
  }

  function calculateJoint(spouse1Gross, spouse2Gross, spouse1Over65, spouse2Over65) {
    const spouse1Net = spouse1Gross > 0 ? Math.max(0, spouse1Gross - WORK_DEDUCTION) : 0;
    const spouse2Net = spouse2Gross > 0 ? Math.max(0, spouse2Gross - WORK_DEDUCTION) : 0;
    const totalNet = spouse1Net + spouse2Net;

    const base = Math.max(0, totalNet - JOINT_REDUCTION);

    let spouse1Allow = spouse1Over65 ? MIN_OVER_65 : MIN_UNDER_65;
    let spouse2Allow = spouse2Over65 ? MIN_OVER_65 : MIN_UNDER_65;

    // AEAT rule: spouse's allowance applies ONLY if spouse has income > 0
    if (spouse2Gross <= 0) spouse2Allow = 0;

    const totalAllowance = spouse1Allow + spouse2Allow;

    const grossTax = taxOnBase(base);
    const allowanceTax = taxOnBase(totalAllowance);
    const tax = Math.max(0, grossTax - allowanceTax);

    const totalGross = spouse1Gross + spouse2Gross;
    return {
      totalGross: totalGross,
      tax: tax,
      netIncome: totalGross - tax,
      base: base,
      totalAllowance: totalAllowance,
      grossTax: grossTax,
      allowanceTax: allowanceTax,
      spouse1Allow: spouse1Allow,
      spouse2Allow: spouse2Allow
    };
  }

  // ---- UI ----
  function formatCurrency(amount) {
    return amount.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  function calculateTax() {
    const spouse1Gross = parseFloat(document.getElementById('spouse1Income').value) || 0;
    const spouse2Gross = parseFloat(document.getElementById('spouse2Income').value) || 0;
    const spouse1Over65 = document.getElementById('spouse1Over65').checked;
    const spouse2Over65 = document.getElementById('spouse2Over65').checked;
    const filingStatus = document.getElementById('filingStatus').value;

    const resultDiv = document.getElementById('results');
    const contentDiv = document.getElementById('resultContent');

    let html = '';

    if (filingStatus === 'separate') {
      const s1 = calculateIndividual(spouse1Gross, spouse1Over65);
      const s2 = calculateIndividual(spouse2Gross, spouse2Over65);
      const totalTax = s1.tax + s2.tax;
      const totalNet = s1.netIncome + s2.netIncome;

      html = `
        <h3 style="margin-top:0;">Separate Filing – Results</h3>
        <div class="result-grid">
          <div class="result-item"><span class="label">Spouse-1 Gross Income</span><span class="value">€${formatCurrency(s1.gross)}</span></div>
          <div class="result-item"><span class="label">Spouse-1 Tax</span><span class="value">€${formatCurrency(s1.tax)}</span></div>
          <div class="result-item"><span class="label">Spouse-1 Net Income</span><span class="value">€${formatCurrency(s1.netIncome)}</span></div>
          <div class="result-item"><span class="label">Spouse-1 Allowance Used</span><span class="value">€${formatCurrency(s1.allowance)}</span></div>
          <div style="border-top:1px solid #dce3f0; grid-column:1/-1;"></div>
          <div class="result-item"><span class="label">Spouse-2 Gross Income</span><span class="value">€${formatCurrency(s2.gross)}</span></div>
          <div class="result-item"><span class="label">Spouse-2 Tax</span><span class="value">€${formatCurrency(s2.tax)}</span></div>
          <div class="result-item"><span class="label">Spouse-2 Net Income</span><span class="value">€${formatCurrency(s2.netIncome)}</span></div>
          <div class="result-item"><span class="label">Spouse-2 Allowance Used</span><span class="value">€${formatCurrency(s2.allowance)}</span></div>
          <div style="border-top:2px solid #1a2b4c; grid-column:1/-1;"></div>
          <div class="result-item" style="font-weight:700;"><span class="label">Total Tax Payable</span><span class="value">€${formatCurrency(totalTax)}</span></div>
          <div class="result-item" style="font-weight:700;"><span class="label">Total Net Income</span><span class="value">€${formatCurrency(totalNet)}</span></div>
        </div>
        <div class="highlight">💰 Effective tax rate: ${((totalTax / (spouse1Gross + spouse2Gross)) * 100).toFixed(1)}%</div>
      `;
    } else {
      const j = calculateJoint(spouse1Gross, spouse2Gross, spouse1Over65, spouse2Over65);
      const s1 = calculateIndividual(spouse1Gross, spouse1Over65);
      const s2 = calculateIndividual(spouse2Gross, spouse2Over65);
      const separateTax = s1.tax + s2.tax;
      const saving = separateTax - j.tax;

      html = `
        <h3 style="margin-top:0;">Joint Filing – Results</h3>
        <div class="result-grid">
          <div class="result-item"><span class="label">Total Gross Income</span><span class="value">€${formatCurrency(j.totalGross)}</span></div>
          <div class="result-item"><span class="label">Joint Reduction</span><span class="value">€${formatCurrency(JOINT_REDUCTION)}</span></div>
          <div class="result-item"><span class="label">Taxable Base</span><span class="value">€${formatCurrency(j.base)}</span></div>
          <div class="result-item"><span class="label">Spouse-1 Allowance</span><span class="value">€${formatCurrency(j.spouse1Allow)}</span></div>
          <div class="result-item"><span class="label">Spouse-2 Allowance (${spouse2Gross > 0 ? 'applied' : 'lost (no income)'})</span><span class="value">€${formatCurrency(j.spouse2Allow)}</span></div>
          <div class="result-item"><span class="label">Total Allowance Tax Credit</span><span class="value">€${formatCurrency(j.allowanceTax)}</span></div>
          <div style="border-top:2px solid #1a2b4c; grid-column:1/-1;"></div>
          <div class="result-item" style="font-weight:700;"><span class="label">Joint Tax Payable</span><span class="value">€${formatCurrency(j.tax)}</span></div>
          <div class="result-item" style="font-weight:700;"><span class="label">Joint Net Income</span><span class="value">€${formatCurrency(j.netIncome)}</span></div>
        </div>
        <div style="margin:1rem 0 0.5rem; background:#e6f0fa; border-radius:8px; padding:0.8rem;">
          <div style="display:flex; justify-content:space-between; flex-wrap:wrap;">
            <span><strong>Separate filing tax:</strong> €${formatCurrency(separateTax)}</span>
            <span><strong>Joint filing tax:</strong> €${formatCurrency(j.tax)}</span>
            <span style="color:${saving > 0 ? '#0b6e2e' : '#b91c1c'}; font-weight:700;">
              ${saving > 0 ? '✅ SAVING with Separate: €' : '❌ EXTRA with Joint: €'}${formatCurrency(Math.abs(saving))}
            </span>
          </div>
        </div>
        <div class="highlight">💰 Effective tax rate: ${((j.tax / j.totalGross) * 100).toFixed(1)}%</div>
      `;
    }

    contentDiv.innerHTML = html;
    resultDiv.classList.add('visible');
  }

  // Auto-run on load with default values
  window.onload = calculateTax;
</script>

</body>
</html>
